services:
  postgres:
    image: postgres:16-alpine
    container_name: car-selector-db
    environment:
      POSTGRES_DB: car_selector
      POSTGRES_USER: caruser
      POSTGRES_PASSWORD: carpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: