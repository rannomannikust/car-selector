spring:
datasource:
    url: jdbc:postgresql://localhost:5432/car_selector
    username: caruser
    password: carpassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
    ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jpa:
    hibernate:
      ddl-auto: validate # Nüüd Hibernate ainult kontrollib, kas tabelid on olemas
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
