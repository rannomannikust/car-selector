<!DOCTYPE html>
<html lang="et" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proovitöö - Autode valik</title>
</head>
<body>

    <h2>Palun sisestage enda kontaktandmed ning automargid, millest olete huvitatud</h2>

    <form action="/save" method="POST">
        
        <div>
            <label for="fullName">Ees- ja perekonnanimi:</label>
            <input type="text" id="fullName" name="fullName" required>
        </div>

        <div>
            <label for="phone">Kontakttelefon:</label>
            <input type="tel" id="phone" name="phone" required>
        </div>

        <div>
            <label for="carBrands">Automargid:</label>
            <select id="carBrands" name="selectedCarBrands" multiple required>
                <option th:each="brand : ${carBrands}" 
                        th:value="${brand.id}" 
                        th:utext="${brand.displayName}">
                </option>
            </select>
        </div>

        <div>
            <label for="hasLicense">
                <input type="checkbox" id="hasLicense" name="hasLicense">
                Kas Teil on kehtiv juhiluba?
            </label>
        </div>

        <div>
            <button type="submit">Salvesta</button>
        </div>

    </form>

</body>
</html>
