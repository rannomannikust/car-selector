<!DOCTYPE html>
<html lang="et" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proovitöö - Autode valik</title>
</head>
<body>

    <h2>Palun sisestage enda kontaktandmed ning automargid, millest olete huvitatud</h2>

<form th:action="@{/save}" th:object="${userSelection}" method="post">
    <!-- <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /> -->
    <div th:if="${successMessage}" style="color: green; font-weight: bold;">
        <p th:text="${successMessage}"></p>
    </div>

    <div>
        <label>Eesnimi:</label>
        <input type="text" th:field="*{firstName}" />
        <p th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" style="color: red;"></p>
    </div>

    <div>
        <label>Perenimi:</label>
        <input type="text" th:field="*{lastName}" />
        <p th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" style="color: red;"></p>
    </div>

    <div>
        <label>Automargid:</label>
        <select th:field="*{selectedCarBrandIds}" multiple required>
            <option th:each="brand : ${carBrands}" 
                    th:value="${brand.id}" 
                    th:utext="${brand.displayName}">
            </option>
        </select>
        <p th:if="${#fields.hasErrors('selectedCarBrandIds')}" th:errors="*{selectedCarBrandIds}" style="color: red;"></p>
    </div>
    <div>
        <label for="hasLicense">
            <input type="checkbox" th:field="*{hasLicense}" id="hasLicense" name="hasLicense">
            Kas Teil on kehtiv juhiluba?
        </label>
    </div>
   <button type="submit">Salvesta</button>
</form>

</body>
</html>
