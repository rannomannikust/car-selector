<!DOCTYPE html>
<html lang="et" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proovitöö "Autode valik"</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
</head>

<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-body">

            <h2 class="mb-4 text-center">Autode valiku vorm</h2>

            <p class="text-muted text-center mb-4">
                Palun sisestage enda kontaktandmed ning automargid, millest olete huvitatud.
            </p>

            <!-- Success message -->
            <div th:if="${successMessage}" class="alert alert-success text-center">
                <span th:text="${successMessage}"></span>
            </div>

            <form th:action="@{/save}" th:object="${userSelectionDto}" method="post">

                <!-- First name -->
                <div class="mb-3">
                    <label class="form-label">Eesnimi</label>
                    <input type="text" th:field="*{firstName}" class="form-control" required>
                    <div class="text-danger small" 
                         th:if="${#fields.hasErrors('firstName')}" 
                         th:errors="*{firstName}">
                    </div>
                </div>

                <!-- Last name -->
                <div class="mb-3">
                    <label class="form-label">Perenimi</label>
                    <input type="text" th:field="*{lastName}" class="form-control" required>
                    <div class="text-danger small" 
                         th:if="${#fields.hasErrors('lastName')}" 
                         th:errors="*{lastName}">
                    </div>
                </div>

                <!-- Car brands -->
                <div class="mb-3">
                    <label class="form-label">Automargid</label>
                    <select th:field="*{selectedCarBrandIds}" multiple required class="form-select" size="10">
                        <option th:each="brand : ${carBrands}"
                                th:value="${brand.id}"
                                th:utext="${brand.displayName}">
                        </option>
                    </select>
                    <div class="text-danger small" 
                         th:if="${#fields.hasErrors('selectedCarBrandIds')}" 
                         th:errors="*{selectedCarBrandIds}">
                    </div>
                </div>

                <!-- License -->
                <div class="form-check mb-3">
                    <input type="checkbox" th:field="*{hasLicense}" id="hasLicense" class="form-check-input">
                    <label for="hasLicense" class="form-check-label">
                        Kas Teil on kehtiv juhiluba?
                    </label>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-primary w-100">
                    Salvesta
                </button>

            </form>
        </div>
    </div>
</div>

</body>
</html>
