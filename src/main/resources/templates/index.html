<!DOCTYPE html>
<html lang="et" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title  th:text="#{page.title}">Autode valik</title>
    <link rel="icon" type="image/png" href="/favicon.PNG" th:href="@{/favicon.PNG}">
    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
    <style>
        select option {
            white-space: pre;
        }
    </style>
</head>

<body class="bg-light">
<div class="text-end p-2">
    <a th:href="@{/(lang='et')}">EST</a> | 
    <a th:href="@{/(lang='en')}">ENG</a>
</div>
<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-body">

            <h2 class="mb-4 text-center" th:text="#{page.name}">Autode valiku vorm</h2>

            <p class="text-muted text-center mb-4" th:text="#{page.instruction}">
                Palun sisestage enda kontaktandmed ning automargid, millest olete huvitatud.
            </p>

            <!-- Success message -->
            <div th:if="${successMessage}" class="alert alert-success text-center">
                <span th:text="${successMessage}"></span>
            </div>

            <form th:action="@{/save}" th:object="${userSelectionDto}" method="post">

                <!-- First name -->
                <div class="mb-3">
                    <label for="firstName" class="form-label" th:text="#{form.firstname}">Eesnimi</label>
                    <input type="text" th:field="*{firstName}" id="firstName" class="form-control">
                    <p class="text-danger small" 
                         th:if="${#fields.hasErrors('firstName')}" 
                         th:errors="*{firstName}" style="color: red;">
                    </p>
                </div>

                <!-- Last name -->
                <div class="mb-3">
                    <label for="lastName" class="form-label" th:text="#{form.lastname}">Perenimi</label>
                    <input type="text" th:field="*{lastName}" id="lastName" class="form-control">
                    <p class="text-danger small"
                         th:if="${#fields.hasErrors('lastName')}" 
                         th:errors="*{lastName}" style="color: red;">
                    </p>
                </div>

                <!-- Car brands -->
                <div class="mb-3">
                    <label for="selectedCarBrandIds" class="form-label" th:text="#{form.brands}">Automargid</label>
                    <select th:field="*{selectedCarBrandIds}" id="selectedCarBrandIds" multiple class="form-select" size="10" >
                        <option th:each="brand : ${carBrands}"
                                th:value="${brand.id}"
                                th:text="${'   '.repeat(brand.stepLevel) + brand.brandName}">
                        </option>
                    </select>
                    <p class="text-danger small" 
                         th:if="${#fields.hasErrors('selectedCarBrandIds')}" 
                         th:errors="*{selectedCarBrandIds}" style="color: red;">
                    </p>
                </div>

                <!-- License -->
                <div class="form-check mb-3">
                    <input type="checkbox" th:field="*{hasLicense}" id="hasLicense" class="form-check-input">
                    <label for="hasLicense" class="form-check-label" th:text="#{form.license}">
                        Kas Teil on kehtiv juhiluba?
                    </label>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-primary w-100" th:text="#{form.submit}">
                    Salvesta
                </button>

            </form>
        </div>
    </div>
</div>

</body>
</html>
