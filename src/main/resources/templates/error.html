<!DOCTYPE html>
<html lang="en" th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
    <head>
        <title  th:text="#{errorpage.title}">Viga / Error</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    </head>
    <body class="container mt-5 text-center">
        <h1 class="text-danger" th:text="#{error.title}">Midagi läks valesti!</h1>
        <p  th:text="${error} ?: #{error.message}">Tekkis ootamatu viga. Palun proovige uuesti.</p>
        <a th:href="@{/}" class="btn btn-primary" th:text="#{error.back}">Tagasi pealehele</a>
    </body>
</html>
